name: AI Security Surveillance System - CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ─── Backend Tests ────────────────────────────────────────────────────────
  backend-test:
    name: 🐍 Backend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run backend tests
        working-directory: ./backend
        run: |
          python -m pytest tests/ -v --tb=short

      - name: Lint with flake8
        working-directory: ./backend
        run: |
          pip install flake8
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics --exclude=__pycache__

  # ─── Frontend Tests ───────────────────────────────────────────────────────
  frontend-test:
    name: ⚛️ Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Run frontend tests
        working-directory: ./frontend
        run: npm test -- --watchAll=false --passWithNoTests

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build
        env:
          REACT_APP_API_URL: http://localhost:8000
          CI: false

  # ─── Docker Build ─────────────────────────────────────────────────────────
  docker-build:
    name: 🐳 Docker Build
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend Docker image
        run: |
          docker build -t ai-security-backend:latest ./backend

      - name: Build frontend Docker image  
        run: |
          docker build -t ai-security-frontend:latest ./frontend

      - name: Docker Compose test
        run: |
          docker compose config

  # ─── Security Scan ────────────────────────────────────────────────────────
  security-scan:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    needs: backend-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Bandit security scan
        working-directory: ./backend
        run: |
          pip install bandit
          bandit -r app/ -ll || true

  # ─── Deploy (Production) ─────────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to Production
    runs-on: ubuntu-latest
    needs: [docker-build, security-scan]
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy notification
        run: |
          echo "✅ All checks passed!"
          echo "🚀 Deploying AI Security Surveillance System v1.0.0"
          echo "📊 Backend: FastAPI on port 8000"
          echo "⚛️  Frontend: React on port 3000"
          echo "🤖 AI Engine: YOLOv8 ready"
        # In production: use SSH deployment, AWS ECS, or Kubernetes here
