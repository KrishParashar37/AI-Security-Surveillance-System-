version: '3.9'

services:
  # MongoDB Database
  mongodb:
    image: mongo:7.0
    container_name: surveillance-db
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=surveillance_db
    networks:
      - surveillance-net
    restart: unless-stopped

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: surveillance-backend
    ports:
      - "8000:8000"
    environment:
      - MONGO_URI=mongodb://mongodb:27017
      - DB_NAME=surveillance_db
      - DEBUG=false
      - SECRET_KEY=${SECRET_KEY:-change-this-in-production}
      - JWT_SECRET=${JWT_SECRET:-change-this-jwt-secret}
      - CORS_ORIGINS=["http://localhost:3000","http://frontend"]
    volumes:
      - ./backend/data:/app/data
    depends_on:
      - mongodb
    networks:
      - surveillance-net
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')" ]
      interval: 30s
      timeout: 10s
      retries: 3

  # Frontend React App
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: surveillance-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - surveillance-net
    restart: unless-stopped

volumes:
  mongodb_data:


networks:
  surveillance-net:
    driver: bridge
